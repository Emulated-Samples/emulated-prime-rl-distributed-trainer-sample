# Default values for prime-rl
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
namespace: default

# Docker image configuration
image:
  repository: primeintellect/prime-rl
  pullPolicy: IfNotPresent
  tag: "main"

# Shared storage configuration
storage:
  enabled: true
  # PVC name will be automatically set to {{ .Release.Name }}-shared-data
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  size: 1Ti
  mountPath: /data

# Orchestrator component
orchestrator:
  enabled: true
  replicas: 1

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  # Example command - use $INFERENCE_URL directly (comma-separated list of all inference server URLs)
  command: ""  # e.g., 'uv run orchestrator @ /app/examples/reverse_text/rl/orch.toml --output-dir /data/outputs/run_default --client.base-url $INFERENCE_URL'
  # $INFERENCE_URL is auto-set to: 'http://<release>-inference-0...:8000/v1,http://<release>-inference-1...:8000/v1,...'

  resources:
    requests:
      memory: "2Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000
    ncclPort: 29501

  env: []
  # - name: CUSTOM_ENV
  #   value: "value"

  nodeSelector: {}
    # nvidia.com/gpu.present: "true"  # Orchestrator doesn't need GPUs

# Inference component
inference:
  enabled: true
  replicas: 1

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  command: ""  # e.g., "uv run inference @ /app/examples/reverse_text/rl/infer.toml"

  gpu:
    enabled: true
    count: 1

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000

  runtimeClassName: nvidia

# Trainer component
trainer:
  enabled: true
  replicas: 1

  # Mount agent-edited task source into the running trainer container.
  # Create the ConfigMap with these keys and set enabled=true plus configMapName
  # before installing/upgrading.
  sourceOverride:
    enabled: false
    configMapName: ""
    mountPath: /workspace-source
    files:
      - key: loss.py
        target: /app/src/prime_rl/trainer/rl/loss.py
      - key: data.py
        target: /app/src/prime_rl/trainer/rl/data.py
      - key: packer.py
        target: /app/src/prime_rl/trainer/rl/packer.py
      - key: train.py
        target: /app/src/prime_rl/trainer/rl/train.py
      - key: transport-init.py
        target: /app/src/prime_rl/transport/__init__.py
      - key: transport-base.py
        target: /app/src/prime_rl/transport/base.py
      - key: transport-config.py
        target: /app/src/prime_rl/transport/config.py
      - key: transport-types.py
        target: /app/src/prime_rl/transport/types.py
      - key: transport-filesystem.py
        target: /app/src/prime_rl/transport/filesystem.py
      - key: transport-zmq.py
        target: /app/src/prime_rl/transport/zmq.py
      - key: broadcast-init.py
        target: /app/src/prime_rl/trainer/rl/broadcast/__init__.py
      - key: broadcast-base.py
        target: /app/src/prime_rl/trainer/rl/broadcast/base.py
      - key: broadcast-filesystem.py
        target: /app/src/prime_rl/trainer/rl/broadcast/filesystem.py
      - key: broadcast-nccl.py
        target: /app/src/prime_rl/trainer/rl/broadcast/nccl.py
      - key: parallel-dims.py
        target: /app/src/prime_rl/trainer/parallel_dims.py
      - key: multi-ckpt.py
        target: /app/src/prime_rl/trainer/multi_ckpt.py

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  command: ""  # e.g., "uv run trainer @ /app/examples/reverse_text/rl/train.toml --output-dir /data/outputs"

  # Helps reduce CUDA memory fragmentation with PyTorch allocator
  pytorchCudaAllocConf: "expandable_segments:True"

  gpu:
    enabled: true
    count: 1

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000
    ncclPort: 29501

  env: []

  runtimeClassName: nvidia

# Additional configuration
config:
  # Example name (used for labeling)
  example: "reverse-text"

  # Secrets (optional)
  secrets:
    enabled: false
    name: prime-rl-secrets
    # wandbApiKey: ""
    # hfToken: ""
