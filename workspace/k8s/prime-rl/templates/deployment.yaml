{{- if .Values.orchestrator.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prime-rl.labels" . | nindent 4 }}
    {{- include "prime-rl.componentLabels" . | nindent 4 }}
    role: orchestrator
spec:
  serviceName: {{ .Release.Name }}-orchestrator-headless
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      {{- include "prime-rl.componentLabels" . | nindent 6 }}
      role: orchestrator
  template:
    metadata:
      labels:
        {{- include "prime-rl.selectorLabels" . | nindent 8 }}
        {{- include "prime-rl.componentLabels" . | nindent 8 }}
        role: orchestrator
    spec:
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: prime-rl
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.orchestrator.autoStart }}
        command: ["/bin/bash", "-c"]
        args:
          - {{ .Values.orchestrator.command }}
        {{- else }}
        command: ["sleep", "infinity"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.orchestrator.service.port }}
          name: api
        - containerPort: {{ .Values.orchestrator.service.ncclPort }}
          name: nccl
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ROLE
          value: "orchestrator"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STATEFUL_REPLICAS
          value: "{{ .Values.orchestrator.replicas }}"
        - name: HEADLESS_SERVICE
          value: "{{ .Release.Name }}-orchestrator-headless.{{ .Values.namespace }}.svc.cluster.local"
        - name: INFERENCE_URL
          {{- $releaseName := .Release.Name }}
          {{- $namespace := .Values.namespace }}
          {{- $port := int .Values.inference.service.port }}
          {{- $replicas := int .Values.inference.replicas }}
          {{- $urls := list }}
          {{- range $i := until $replicas }}
          {{- $url := printf "http://%s-inference-%d.%s-inference-headless.%s.svc.cluster.local:%d/v1" $releaseName $i $releaseName $namespace $port }}
          {{- $urls = append $urls $url }}
          {{- end }}
          value: {{ $urls | join "," | quote }}
        {{- with .Values.orchestrator.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.secrets.enabled }}
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: wandb-api-key
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: hf-token
              optional: true
        {{- end }}
        resources:
          {{- toYaml .Values.orchestrator.resources | nindent 10 }}
        {{- if .Values.storage.enabled }}
        volumeMounts:
        - name: shared-data
          mountPath: {{ .Values.storage.mountPath }}
        {{- end }}
      {{- if .Values.storage.enabled }}
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-shared-data
      {{- end }}
{{- end }}
---
{{- if .Values.inference.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-inference
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prime-rl.labels" . | nindent 4 }}
    {{- include "prime-rl.componentLabels" . | nindent 4 }}
    role: inference
spec:
  serviceName: {{ .Release.Name }}-inference-headless
  replicas: {{ .Values.inference.replicas }}
  selector:
    matchLabels:
      {{- include "prime-rl.componentLabels" . | nindent 6 }}
      role: inference
  template:
    metadata:
      labels:
        {{- include "prime-rl.selectorLabels" . | nindent 8 }}
        {{- include "prime-rl.componentLabels" . | nindent 8 }}
        role: inference
    spec:
      {{- if .Values.inference.runtimeClassName }}
      runtimeClassName: {{ .Values.inference.runtimeClassName }}
      {{- end }}
      containers:
      - name: prime-rl
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.inference.autoStart }}
        command: ["/bin/bash", "-c"]
        args:
          - {{ .Values.inference.command }}
        {{- else }}
        command: ["sleep", "infinity"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.inference.service.port }}
          name: api
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ROLE
          value: "inference"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STATEFUL_REPLICAS
          value: "{{ .Values.inference.replicas }}"
        - name: HEADLESS_SERVICE
          value: "{{ .Release.Name }}-inference-headless.{{ .Values.namespace }}.svc.cluster.local"
        {{- with .Values.inference.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.secrets.enabled }}
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: wandb-api-key
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: hf-token
              optional: true
        {{- end }}
        resources:
          requests:
            {{- if .Values.inference.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.inference.gpu.count }}
            {{- end }}
            memory: {{ .Values.inference.resources.requests.memory }}
            cpu: {{ .Values.inference.resources.requests.cpu }}
          limits:
            {{- if .Values.inference.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.inference.gpu.count }}
            {{- end }}
            {{- if .Values.inference.resources.limits }}
            memory: {{ .Values.inference.resources.limits.memory }}
            cpu: {{ .Values.inference.resources.limits.cpu }}
            {{- end }}
        {{- if .Values.storage.enabled }}
        volumeMounts:
        - name: shared-data
          mountPath: {{ .Values.storage.mountPath }}
        {{- end }}
      {{- if .Values.storage.enabled }}
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-shared-data
      {{- end }}
{{- end }}
---
{{- if .Values.trainer.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-trainer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prime-rl.labels" . | nindent 4 }}
    {{- include "prime-rl.componentLabels" . | nindent 4 }}
    role: trainer
spec:
  serviceName: {{ .Release.Name }}-trainer-headless
  replicas: {{ .Values.trainer.replicas }}
  selector:
    matchLabels:
      {{- include "prime-rl.componentLabels" . | nindent 6 }}
      role: trainer
  template:
    metadata:
      labels:
        {{- include "prime-rl.selectorLabels" . | nindent 8 }}
        {{- include "prime-rl.componentLabels" . | nindent 8 }}
        role: trainer
    spec:
      {{- if .Values.trainer.runtimeClassName }}
      runtimeClassName: {{ .Values.trainer.runtimeClassName }}
      {{- end }}
      containers:
      - name: prime-rl
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.trainer.autoStart }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            {{- if .Values.trainer.sourceOverride.enabled }}
            set -euo pipefail
            {{- range .Values.trainer.sourceOverride.files }}
            mkdir -p "$(dirname {{ .target | quote }})"
            cp "{{ $.Values.trainer.sourceOverride.mountPath }}/{{ .key }}" {{ .target | quote }}
            {{- end }}
            cat > /app/src/prime_rl/trainer/rl/config.py <<'PY'
            """Compatibility shim for workspace trainer source."""
            from prime_rl.configs.trainer import (
                AdamWConfig,
                BaseWeightBroadcastConfig,
                BenchConfig,
                CheckpointConfig,
                ConstantSchedulerConfig,
                DataLoaderConfig,
                DefaultLossConfig as LossConfig,
                FakeDataLoaderConfig,
                FileSystemWeightBroadcastConfig,
                ModelConfig,
                NCCLWeightBroadcastConfig,
                OptimizerConfig as OptimizerConfigType,
                SchedulerConfig as SchedulerConfigType,
                TokenizerConfig,
                TrainerConfig as RLTrainerConfig,
                WeightBroadcastConfig as WeightBroadcastConfigType,
            )
            from prime_rl.configs.shared import (
                FileSystemTransportConfig,
                HeartbeatConfig,
                LogConfig,
                MetricsServerConfig,
                TransportConfig as TransportConfigType,
                WandbConfig,
            )
            from prime_rl.utils.pydantic_config import BaseConfig, BaseSettings
            PY
            python3 - <<'PY'
            import prime_rl.transport as t
            init_file = t.__file__
            with open(init_file, "r", encoding="utf-8") as f:
                content = f.read()
            if "TransportConfigType" not in content:
                with open(init_file, "a", encoding="utf-8") as f:
                    f.write("\n# Compatibility alias for mounted workspace trainer source\nTransportConfigType = TransportConfig\n")
            PY
            find /app/src/prime_rl -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true
            {{- end }}
            {{ .Values.trainer.command }}
        {{- else }}
        command: ["sleep", "infinity"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.trainer.service.port }}
          name: api
        - containerPort: {{ .Values.trainer.service.ncclPort }}
          name: nccl
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ROLE
          value: "trainer"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STATEFUL_REPLICAS
          value: "{{ .Values.trainer.replicas }}"
        - name: HEADLESS_SERVICE
          value: "{{ .Release.Name }}-trainer-headless.{{ .Values.namespace }}.svc.cluster.local"
        {{- if .Values.trainer.pytorchCudaAllocConf }}
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: {{ .Values.trainer.pytorchCudaAllocConf | quote }}
        {{- end }}
        - name: INFERENCE_URL
          {{- $releaseName := .Release.Name }}
          {{- $namespace := .Values.namespace }}
          {{- $port := int .Values.inference.service.port }}
          {{- $replicas := int .Values.inference.replicas }}
          {{- $urls := list }}
          {{- range $i := until $replicas }}
          {{- $url := printf "http://%s-inference-%d.%s-inference-headless.%s.svc.cluster.local:%d/v1" $releaseName $i $releaseName $namespace $port }}
          {{- $urls = append $urls $url }}
          {{- end }}
          value: {{ $urls | join "," | quote }}
        {{- with .Values.trainer.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.secrets.enabled }}
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: wandb-api-key
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: hf-token
              optional: true
        {{- end }}
        resources:
          requests:
            {{- if .Values.trainer.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.trainer.gpu.count }}
            {{- end }}
            memory: {{ .Values.trainer.resources.requests.memory }}
            cpu: {{ .Values.trainer.resources.requests.cpu }}
          limits:
            {{- if .Values.trainer.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.trainer.gpu.count }}
            {{- end }}
            {{- if .Values.trainer.resources.limits }}
            memory: {{ .Values.trainer.resources.limits.memory }}
            cpu: {{ .Values.trainer.resources.limits.cpu }}
            {{- end }}
        {{- if or .Values.storage.enabled .Values.trainer.sourceOverride.enabled }}
        volumeMounts:
        {{- if .Values.storage.enabled }}
        - name: shared-data
          mountPath: {{ .Values.storage.mountPath }}
        {{- end }}
        {{- if .Values.trainer.sourceOverride.enabled }}
        - name: trainer-source
          mountPath: {{ .Values.trainer.sourceOverride.mountPath }}
          readOnly: true
        {{- end }}
        {{- end }}
      {{- if or .Values.storage.enabled .Values.trainer.sourceOverride.enabled }}
      volumes:
      {{- if .Values.storage.enabled }}
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-shared-data
      {{- end }}
      {{- if .Values.trainer.sourceOverride.enabled }}
      - name: trainer-source
        configMap:
          name: {{ required "trainer.sourceOverride.configMapName is required when trainer.sourceOverride.enabled=true" .Values.trainer.sourceOverride.configMapName }}
      {{- end }}
      {{- end }}
{{- end }}
